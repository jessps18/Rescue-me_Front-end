<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/index.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./imagens/seo.png">
    <title>Rescue-me</title>
</head>

<body>
    <header>
        <h1>Rescue-me</h1>
    </header>
    <main>

        <div class="login">
            <div class="div_azul">

                <h1>Bem vindo de volta ao Rescue-me!</h1>
                <p>Sentimos sua falta.
                    O RescueMe está aqui, pronto para te apoiar e conectar você
                    ao que realmente importa.
                    Conte com o RescueMe para encontrar ajuda ou fazer a diferença, sempre que precisar.
                </p>


            </div>
            <div class="formulario">
                <h1>já tem conta?</h1>
                <p>Faça seu login e procure seus pertences</p>
                <input type="email" name="email" id="email" placeholder="Digite seu Email ou RA">
                <div class="input-container">
                    <input type="password" placeholder="Digite sua Senha" id="senha">
                    <img src="./imagens/eye.png" alt="view" id="eyeLogin">
                </div>
                <button id="login">entrar</button>
            </div>
        </div>

    </main>

</body>

</html>
